// ════════════════════════════════════════════════════════════════[...]
//  HFT CAPITAL PROTECTION — SESSION-LEVEL STOPS (v11)
// ════════════════════════════════════════════════════════════════[...]
const SESSION_PAUSE_PCT   = 0.20;   // pause at 20% DD — don't stop, pause 10 mins
const SESSION_ABORT_PCT   = 0.35;   // abort session at 35% — something is very wrong
const CAUTION_PCT         = 0.08;   // wider: trigger at 8% drawdown (was 5%)

// ── SESSION VOLATILITY MULTIPLIERS FOR SL ──────────────
function getSessionSLMult(hourGMT){
  if(hourGMT>=13 &&hourGMT<17 )return 1.35;
  if(hourGMT>=8  &&hourGMT<10 )return 1.20;
  if(hourGMT>=13 &&hourGMT<15 )return 1.20;
  if(hourGMT>=0  &&hourGMT<8  )return 0.85;
  return 1.0;
}

// ── SWING STRUCTURE FINDER ─────────────────────────────
function findStructureSL(cs, dir, atr){
  if(!cs||cs.length<10)return null;
  const lookback=Math.min(cs.length-1, 30);
  const slice=cs.slice(-lookback);

  if(dir==="BUY"){
    let swingLow=Infinity;
    for(let i=1;i<slice.length-1;i++){
      const c=slice[i];
      if(c.low<slice[i-1].low&&c.low<slice[i+1].low){
        if(c.low<slice[slice.length-1].close){
          swingLow=Math.min(swingLow,c.low);
        }
      }
    }
    if(swingLow===Infinity){
      swingLow=Math.min(...slice.slice(-10).map(c=>c.low));
    }
    return swingLow;
  }else{
    let swingHigh=-Infinity;
    for(let i=1;i<slice.length-1;i++){
      const c=slice[i];
      if(c.high>slice[i-1].high&&c.high>slice[i+1].high){
        if(c.high>slice[slice.length-1].close){
          swingHigh=Math.max(swingHigh,c.high);
        }
      }
    }
    if(swingHigh===-Infinity){
      swingHigh=Math.max(...slice.slice(-10).map(c=>c.high));
    }
    return swingHigh;
  }
}

// ════════════════════════════════════════════════════════════════[...]
//  MASTER HFT SL CALCULATOR (v11 fixes)
//  - Minimum SL floor: $1.50 (was $0.80) — must breathe past spread noise
//  - Pip value: $1/pip (Exness) not $10 (Deriv)
// ════════════════════════════════════════════════════════════════[...]
function calcHFTSL({cs, dir, entry, atr, spread, hourGMT, balance, inst="XAUUSD"}){
  const Layer1=findStructureSL(cs, dir, atr);
  const sweepBuffer=atr*0.30;
  const spreadBuffer=spread*2.0;

  let rawSL;
  if(Layer1!==null){
    if(dir==="BUY"){
      rawSL=Math.abs(entry-(Layer1-sweepBuffer-spreadBuffer));
    }else{
      rawSL=Math.abs((Layer1+sweepBuffer+spreadBuffer)-entry);
    }
  }else{
    rawSL=1.2*atr+spreadBuffer;
  }

  const sessMult=getSessionSLMult(hourGMT||0);
  rawSL=rawSL*sessMult;

  const minATRCover=atr*1.0;
  rawSL=Math.max(rawSL, minATRCover);

  // FIXED: minimum $1.50 instead of $0.80 — needs room to breathe past spread
  rawSL=Math.max(rawSL, 1.50);

  const pip=INSTRUMENTS[inst]?.pip||1;
  const maxRiskPerTrade=balance*0.10;
  const maxSLAtMinLot=maxRiskPerTrade/(MIN_LOT*pip*100);
  rawSL=Math.min(rawSL, maxSLAtMinLot);

  const slPrice=dir==="BUY"
    ?+(entry-rawSL).toFixed(2)
    :+(entry+rawSL).toFixed(2);

  return{sl:slPrice, slD:+rawSL.toFixed(2)};
}

// ════════════════════════════════════════════════════════════════[...]
//  TARGET-AWARE DYNAMIC RISK (v11 MASTER RISK ENGINE)
//  3-Phase Model:
//  Phase 1: Build (< 50% to target) — aggressive 3-5% risk
//  Phase 2: Compound (50-85%) — momentum 4-7% risk
//  Phase 3: Secure (> 85%) — lock gains 2-3% risk
//  
//  INCLUDES: Recovery Mode, Hot Streak, Catch-Up Mode for stress tests
// ════════════════════════════════════════════════════════════════[...]
function calcHFTLots({balance, dayStartBal, targetBal, strength, slD, score, consecutiveWins=0, inst="XAUUSD"}){
  const pip=INSTRUMENTS[inst]?.pip||1;

  // === PROGRESS TRACKING ===
  const distToTarget=(targetBal-balance)/Math.max(targetBal,0.01);
  const profitProgress=(balance-dayStartBal)/Math.max(targetBal-dayStartBal,0.01);
  
  // === SESSION-LEVEL DRAWDOWN PROTECTION ===
  const ddPct=(dayStartBal-balance)/Math.max(dayStartBal,0.01);
  const inPause=ddPct>=SESSION_PAUSE_PCT&&ddPct<SESSION_ABORT_PCT;
  const inAbort=ddPct>=SESSION_ABORT_PCT;

  if(inAbort) return{lots:0,riskDollars:0,riskPct:0,reason:"ABORT"}; // session kill

  // === VOTE TIER (score = votes, if not provided estimate from strength) ===
  const votes=score||Math.round((strength/100)*MAX_SCORE);

  // === PHASE-BASED RISK MODEL ===
  let riskPct;
  
  if(profitProgress>=0.85){
    // PHASE 3: SECURE — near target, lock in gains, only take highest conviction
    if(votes>=5) riskPct=0.015;  // only very high conviction
    else riskPct=0.000;           // skip lower conviction trades
  }else if(profitProgress>=0.50){
    // PHASE 2: COMPOUND — mid-journey, steady compounding (most explosive growth here)
    if(votes>=6) riskPct=0.045;
    else if(votes>=5) riskPct=0.035;
    else if(votes>=4) riskPct=0.025;
    else riskPct=0.015;
  }else{
    // PHASE 1: BUILD — early phase, needs to compound hard
    if(votes>=6) riskPct=0.065;
    else if(votes>=5) riskPct=0.055;
    else if(votes>=4) riskPct=0.040;
    else riskPct=0.025;
  }

  // === RECOVERY MODE ===
  // If balance < 85% of session start AND in Phase 1, switch to high-conviction-only with +6% boost
  const inRecovery=balance<dayStartBal*0.85&&profitProgress<0.40;
  if(inRecovery){
    riskPct=(votes>=5)?0.060:0.000; // only 5+ votes, 6% risk
  }

  // === HOT STREAK MULTIPLIER ===
  // After 3+ consecutive wins, boost by 20% (but capped at absolute max)
  const hotStreakMult=consecutiveWins>=3?1.20:1.0;
  riskPct=riskPct*hotStreakMult;

  // === CATCH-UP MODE FOR STRESS TESTS ===
  // 8× or more target = stress test mode, unlock +30% in early phase only
  const catchUpMode=(targetBal/Math.max(dayStartBal,0.01))>=8;
  if(catchUpMode&&profitProgress<0.40){
    riskPct=Math.min(riskPct*1.30, 0.08);
  }

  // === SESSION PAUSE ADJUSTMENTS ===
  if(inPause) riskPct=riskPct*0.45;  // reduce to 45% during pause

  // === DRAWDOWN PROTECTION (relative to SESSION start) ===
  if(ddPct>=0.20) riskPct=riskPct*0.25;       // severe: 20%+ → quarter
  else if(ddPct>=0.12) riskPct=riskPct*0.45;  // danger: 12%+ → halve
  else if(ddPct>=0.08) riskPct=riskPct*0.70;  // caution: 8%+ → reduce

  // === ABSOLUTE RISK CAP (never risk more than 15% of START balance per trade) ===
  const riskDollars=balance*riskPct;
  const absoluteMaxRisk=dayStartBal*0.15;
  const cappedRiskDollars=Math.min(riskDollars,absoluteMaxRisk);

  // === LOT CALCULATION ===
  // lotRaw = riskDollars / (slD × pip × 100)
  // Because pip=$1 per 0.01 lot → $100 per 1.0 lot
  const lotRaw=cappedRiskDollars/(Math.max(slD,0.50)*pip*100);
  const lots=+Math.min(Math.max(lotRaw,MIN_LOT),5.0).toFixed(2);

  return{
    lots,
    riskDollars:+cappedRiskDollars.toFixed(2),
    riskPct:+(cappedRiskDollars/Math.max(balance,0.01)).toFixed(4),
    phase:profitProgress>=0.85?"SECURE":profitProgress>=0.50?"COMPOUND":"BUILD",
    recovery:inRecovery,
    hotStreak:consecutiveWins>=3,
  };
}

// ── HELPERS ────────────────────────────────────────────────────────
const nearRound=(p,w=1.5)=>{
  const interval=p>5000?1000:100;
  const scaled=w*(interval/100);
  return Math.abs(p-Math.round(p/interval)*interval)<=scaled;
};
function snapTP(tp,dir){
  const interval=tp>5000?500:50;
  const tol=tp>5000?35:3.5;
  const off=tp>5000?25:2.5;
  const r=Math.round(tp/interval)*interval;
  return Math.abs(tp-r)<tol?(dir==="BUY"?r+off:r-off):tp;
}

function calcATR(cs,p=12){
  if(!cs||cs.length<2)return 2.0;
  const sl=cs.slice(-(p+1));
  const trs=sl.map((c,i,a)=>!i?c.high-c.low:Math.max(c.high-c.low,Math.abs(c.high-a[i-1].close),Math.abs(c.low-a[i-1].close)));
  const raw=trs.reduce((s,v)=>s+v,0)/trs.length;
  return Math.max(raw,0.50);
}

// Aggregate 1M candles into higher TF candles
function aggregateCandles(m1Candles, tfMins){
  if(!m1Candles||!m1Candles.length)return[];
  const out=[];let cur=null;
  for(const c of m1Candles){
    const slot=Math.floor(c.ts/(tfMins*60000))*(tfMins*60000);
    if(!cur||cur.ts!==slot){
      if(cur)out.push(cur);
      cur={ts:slot,open:c.open,high:c.high,low:c.low,close:c.close,
           bull:c.close>=c.open,body:Math.abs(c.close-c.open),
           range:c.high-c.low,vol:c.vol||0};
    }else{
      cur.high=Math.max(cur.high,c.high);
      cur.low=Math.min(cur.low,c.low);
      cur.close=c.close;
      cur.bull=cur.close>=cur.open;
      cur.body=Math.abs(cur.close-cur.open);
      cur.range=cur.high-cur.low;
      cur.vol=(cur.vol||0)+(c.vol||0);
    }
  }
  if(cur)out.push(cur);
  return out;
}

async function fetchWithTimeout(url,ms=8000,headers={}){
  const ctrl=new AbortController();
  const id=setTimeout(()=>ctrl.abort(),ms);
  try{const r=await fetch(url,{signal:ctrl.signal,headers});clearTimeout(id);return r;}
  catch(e){clearTimeout(id);throw e;}
}

function parseCandle(o,h,l,c,ts,vol=0){
  const op=+o,hi=+h,lo=+l,cl=+c;
  return{ts,open:op,high:hi,low:lo,close:cl,vol:+vol||0,
    bull:cl>=op,body:Math.abs(cl-op),range:hi-lo};
}

function fetchDerivCandles(granularitySecs, count, endEpoch, derivSymbol="frxXAUUSD"){
  return new Promise((resolve,reject)=>{
    const ws=new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");
    let done=false;
    const timeout=setTimeout(()=>{
      if(!done){done=true;ws.close();reject(new Error("Deriv candles timeout"));}
    },20000);

    ws.onopen=()=>{
      const req={
        ticks_history:derivSymbol,
        adjust_start_time:1,
        count:Math.min(count,5000),
        end:endEpoch?String(endEpoch):"latest",
        granularity:granularitySecs,
        style:"candles",
      };
      ws.send(JSON.stringify(req));
    };

    ws.onmessage=e=>{
      if(done)return;
      const d=JSON.parse(e.data);
      if(d.error){done=true;clearTimeout(timeout);ws.close();reject(new Error(d.error.message));return;}
      if(d.candles&&d.candles.length>0){
        done=true;clearTimeout(timeout);ws.close();
        const candles=d.candles.map(c=>parseCandle(c.open,c.high,c.low,c.close,c.epoch*1000,0))
          .filter(c=>c.open>0.01).sort((a,b)=>a.ts-b.ts);
        resolve(candles);
      }
    };
    ws.onerror=()=>{if(!done){done=true;clearTimeout(timeout);reject(new Error("Deriv WS error"));}};
    ws.onclose=()=>{if(!done){done=true;clearTimeout(timeout);reject(new Error("Deriv WS closed"));}};
  });
}

async function fetchDerivHistory(granSecs, lookbackDays, onProgress, derivSymbol="frxXAUUSD"){
  const candlesPerDay=Math.floor(86400/granSecs);
  const totalNeeded=Math.ceil(lookbackDays*candlesPerDay*1.15);
  const maxPerPage=5000;
  const pages=Math.ceil(totalNeeded/maxPerPage);

  let allCandles=[];
  let endEpoch=null;

  onProgress(`📡 Deriv: fetching ${totalNeeded} candles (${pages} page${pages>1?"s":""})...`);

  for(let p=0;p<pages;p++){
    try{
      onProgress(`📡 Deriv page ${p+1}/${pages}...`);
      const batch=await fetchDerivCandles(granSecs,maxPerPage,endEpoch,derivSymbol);
      if(!batch||batch.length===0)break;
      allCandles=[...batch,...allCandles.filter(c=>c.ts>batch[batch.length-1].ts)];
      endEpoch=Math.floor(batch[0].ts/1000)-1;
      if(allCandles.length>=totalNeeded)break;
    }catch(e){
      if(p===0)throw e;
      onProgress(`⚠ Deriv page ${p+1} failed: ${e.message} — using data so far`);
      break;
    }
  }

  const seen=new Set();
  const deduped=allCandles.filter(c=>{if(seen.has(c.ts))return false;seen.add(c.ts);return true;})
    .sort((a,b)=>a.ts-b.ts);

  onProgress(`✓ Deriv: ${deduped.length} candles loaded`);
  return deduped;
}

async function fetchHistoricalData(tfMins, lookbackDays, _apiKeys, onProgress, instrument="XAUUSD"){
  const instr=INSTRUMENTS[instrument]||INSTRUMENTS.XAUUSD;
  const granMap={1:60,5:300,15:900,60:3600,240:14400,1440:86400};
  const granSecs=granMap[tfMins]||60;

  onProgress("📡 Deriv (no API key needed)...");
  const data=await fetchDerivHistory(granSecs,lookbackDays,onProgress,instr.derivSymbol);
  if(data&&data.length>20){
    onProgress(`✓ Deriv: ${data.length} candles (${tfMins}M)`);
    return data;
  }
  throw new Error("Deriv returned no data. Check your internet connection.");
}

// ── LIVE PRICE FEEDS ───────────────────────────────────────────────

function createDerivFeed(onTick,onStatus,derivTickSymbol="frxXAUUSD"){
  let ws=null,alive=true,pingIv=null,watchdogIv=null,lastTickTs=Date.now(),retryDelay=500;

  function teardown(){
    clearInterval(pingIv);pingIv=null;
    clearInterval(watchdogIv);watchdogIv=null;
    if(ws){try{ws.onopen=ws.onmessage=ws.onerror=ws.onclose=null;ws.close();}catch(_){}}
    ws=null;
  }

  function connect(){
    if(!alive)return;
    teardown();
    onStatus("Connecting to Deriv...");
    try{ws=new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");}
    catch(e){onStatus("WS create failed, retrying...");scheduleReconnect();return;}
    ws.onopen=()=>{
      if(!alive){ws.close();return;}
      retryDelay=2000;
      ws.send(JSON.stringify({ticks:derivTickSymbol,subscribe:1}));
      onStatus("● Deriv LIVE");
      lastTickTs=Date.now();
      pingIv=setInterval(()=>{if(ws&&ws.readyState===1)ws.send(JSON.stringify({ping:1}));},12000);
      watchdogIv=setInterval(()=>{
        if(Date.now()-lastTickTs>20000){
          onStatus("⚠ Feed stale — reconnecting...");
          scheduleReconnect();
        }
      },10000);
    };
    let _prevTickQ=0;
    ws.onmessage=e=>{
      try{
        const d=JSON.parse(e.data);
        if(d.tick&&d.tick.quote){
          lastTickTs=Date.now();
          const _q=+d.tick.quote;
          if(_q===_prevTickQ)return;
          _prevTickQ=_q;
          onTick(_q,d.tick.ask,d.tick.bid,Date.now());
        }
      }catch(_){}
    };
    ws.onerror=()=>{if(alive)onStatus("Deriv error");};
    ws.onclose=()=>{if(alive)scheduleReconnect();};
  }

  function scheduleReconnect(){
    teardown();
    if(!alive)return;
    onStatus("Deriv reconnecting...");
    setTimeout(connect,retryDelay);
    retryDelay=Math.min(retryDelay*2,8000);
  }

  function onVisible(){
    if(document.visibilityState==="visible"&&alive){
      const stale=Date.now()-lastTickTs>10000;
      if(stale){onStatus("Tab resumed — reconnecting...");connect();}
    }
  }
  document.addEventListener("visibilitychange",onVisible);

  connect();
  return{
    close:()=>{
      alive=false;
      teardown();
      document.removeEventListener("visibilitychange",onVisible);
    }
  };
}

function s_Impulse(cs,atr){
  if(!cs||cs.length<2)return null;
  const c=cs[cs.length-1];
  const bPct=c.body/Math.max(c.range,0.01);
  if(c.body>=atr*0.75&&bPct>=0.42)return{dir:c.bull?"BUY":"SELL",name:"IMPULSE"};
  return null;
}
function s_Trend(cs,atr){
  if(!cs||cs.length<4)return null;
  const c=cs[cs.length-1],p1=cs[cs.length-2],p2=cs[cs.length-3];
  if(c.bull&&p1.bull&&c.close>p1.close&&p1.close>p2.close&&c.body>atr*0.45)return{dir:"BUY",name:"TREND"};
  if(!c.bull&&!p1.bull&&c.close<p1.close&&p1.close<p2.close&&c.body>atr*0.45)return{dir:"SELL",name:"TREND"};
  return null;
}
function s_ORB(cs,orb){
  if(!orb||!cs||cs.length<2)return null;
  const c=cs[cs.length-1],p=cs[cs.length-2];
  if(c.close>orb.high&&c.bull&&p.close<=orb.high)return{dir:"BUY",name:"ORB"};
  if(c.close<orb.low&&!c.bull&&p.close>=orb.low)return{dir:"SELL",name:"ORB"};
  return null;
}
function s_FVG(cs){
  if(!cs||cs.length<3)return null;
  const[a,,b]=cs.slice(-3);const c=cs[cs.length-1];
  const tol=0.8;
  if(b.low>a.high&&c.low<=b.low+tol&&c.close>=a.high&&c.bull)return{dir:"BUY",name:"FVG"};
  if(b.high<a.low&&c.high>=b.high-tol&&c.close<=a.low&&!c.bull)return{dir:"SELL",name:"FVG"};
  return null;
}
function s_SMC(cs,fakeLog){

  if(c.bull&&c.close>swH&&p.close<=swH&&!isFakeBO(fakeLog,swH,"BUY"))return{dir:"BUY",name:"SMC"};
  if(!c.bull&&c.close<swL&&p.close>=swL&&!isFakeBO(fakeLog,swL,"SELL"))return{dir:"SELL",name:"SMC"};
  return null;
}
function s_Pattern(cs){
  if(!cs||cs.length<4)return null;
  const[,c2,c1,c0]=cs.slice(-4);
  if(c0.bull&&!c1.bull&&c0.body>c1.body*1.04&&c0.open<c1.close&&c0.close>c1.open)return{dir:"BUY",name:"ENGULF"};

  const lw=c0.bull?c0.open-c0.low:c0.close-c0.low,uw=c0.bull?c0.high-c0.close:c0.high-c0.open;
  if(lw>c0.body*2&&uw<c0.body*0.35&&c0.body>0.1)return{dir:"BUY",name:"HAMMER"};
  if(uw>c0.body*2&&lw<c0.body*0.35&&c0.body>0.1)return{dir:"SELL",name:"STAR"};
  if(c0.bull&&c1.bull&&c2.bull&&c0.close>c1.close&&c1.close>c2.close)return{dir:"BUY",name:"3-BULL"};
  if(!c0.bull&&!c1.bull&&!c2.bull&&c0.close<c1.close&&c1.close<c2.close)return{dir:"SELL",name:"3-BEAR"};

}
function s_KZ(cs,hour,kL){

function s_Sweep(cs,atr){
  if(!cs||cs.length<10)return null;
  const lookback=cs.slice(-10,-1);

function s_OB(cs,atr){
  if(!cs||cs.length<5)return null;

    const obTol=0.5;if(c.low<=obTop+obTol&&c.close>=obBot&&c.bull)return{dir:"BUY",name:"OB"};

  if(c3.bull&&!c2.bull&&!c1.bull&&c2.body>atr*0.5&&c1.body>atr*0.4){

function s_CHoCH(cs,atr){

function s_InsideBar(cs,atr){

function s_DoubleTopBottom(cs,atr){
  if(!cs||cs.length<18)return null;
  const slice=cs.slice(-18);
  const c=cs[cs.length-1];
  let p1H=null,p2H=null,troughL=Infinity;
  let p1L=null,p2L=null,peakH=-Infinity;
  for(let i=2;i<slice.length-2;i++){
    if(slice[i].high>=slice[i-1].high&&slice[i].high>=slice[i+1].high&&
       slice[i].high>=slice[i-2].high&&slice[i].high>=slice[i+2].high){
      if(p1H===null)p1H=slice[i].high;
      else if(Math.abs(slice[i].high-p1H)<atr*0.8)p2H=slice[i].high;
    }
    if(slice[i].low<=slice[i-1].low&&slice[i].low<=slice[i+1].low&&
       slice[i].low<=slice[i-2].low&&slice[i].low<=slice[i+2].low){
      if(p1L===null)p1L=slice[i].low;
      else if(Math.abs(slice[i].low-p1L)<atr*0.8)p2L=slice[i].low;
    }
    troughL=Math.min(troughL,slice[i].low);
    peakH=Math.max(peakH,slice[i].high);
  }
  const necklineTop=troughL,necklineBot=peakH;
  if(p1H&&p2H&&c.close<necklineTop&&!c.bull&&c.body>atr*0.25)return{dir:"SELL",name:"DBL-TOP"};
  if(p1L&&p2L&&c.close>necklineBot&&c.bull&&c.body>atr*0.25)return{dir:"BUY",name:"DBL-BOT"};

function s_PinBarRejection(cs,atr,kL){
  if(!cs||cs.length<5)return null;

    const nearLevel=(kL.pdl&&Math.abs(c.close-kL.pdl)<atr*1.2)||
                    (kL.asianL&&Math.abs(c.close-kL.asianL)<atr*1.0)||
                    nearRound(c.close,2.5);

function isFakeBO(log,level,dir){
  if(!log)return false;
  return log.filter(f=>Date.now()-f.t<18*60*1000).some(f=>Math.abs(f.level-level)<2&&f.dir===dir);
}
function isNewsBlackout(newsArr){
  const now=new Date();
  return (newsArr||[]).some(e=>{
    if(!e.date||e.impact!=="High")return false;
    const diff=(new Date(e.date)-now)/60000;
    return diff>=-10&&diff<=20;
  });
}
function getActiveNewsTrade(newsArr){
  const now=new Date();
  return (newsArr||[]).find(e=>{
    if(!e.date||(e.impact!=="Low"&&e.impact!=="Medium"))return false;
    const diff=(new Date(e.date)-now)/60000;
    return diff>=-2&&diff<=12;

}

function getMTFBias(tfCandles){
  let bullCount=0,bearCount=0;
  const check=(cs,weight=1)=>{
    if(!cs||cs.length<5)return;
    const last=cs[cs.length-1],prev=cs[cs.length-2];
    const atr=calcATR(cs,5);
    const l3=[cs[cs.length-3],cs[cs.length-2],cs[cs.length-1]];
    if(l3[2].close>l3[1].close&&l3[1].close>l3[0].close)bullCount+=weight;
    else if(l3[2].close<l3[1].close&&l3[1].close<l3[0].close)bearCount+=weight;
    const range20=cs.slice(-20);
    const midH=Math.max(...range20.map(x=>x.high)),midL=Math.min(...range20.map(x=>x.low));
    const mid=(midH+midL)/2;
    if(last.close>mid)bullCount+=weight*0.5;else bearCount+=weight*0.5;
  };
  check(tfCandles.m5,  0.5);
  check(tfCandles.m15, 1.0);
  check(tfCandles.h1,  1.5);
  check(tfCandles.h4,  2.0);
  check(tfCandles.d1,  2.5);
  const total=bullCount+bearCount;
  if(total<1)return 0;
  const ratio=bullCount/total;
  if(ratio>0.60)return 1;
  if(ratio<0.40)return-1;
  return 0;
}

function detectMarketState(cs){
  if(!cs||cs.length<20)return"NORMAL";
  const atr=calcATR(cs);
  const last=cs[cs.length-1];
  const prev=cs[cs.length-5];
  const trendStrength=Math.abs(last.close-prev.close);
  if(atr>5&&trendStrength>atr*2)return"TRENDING";
  if(atr<2)return"RANGING";
  return"NORMAL";
}

// ════════════════════════════════════════════════════════════════[...]
function masterSignal({cs,hour,kL,spread,orb,news,newsArr,fakeLog,minConf,tfCandles,inst}){
  const _inst=inst||_currentInst||"XAUUSD";
  const spreadLimit=SPREAD_LIMITS[_inst]??MAX_SPREAD;
  if(!cs||cs.length<5)return null;
  if(spread>spreadLimit*3)return null;
  if(isNewsBlackout(newsArr||[]))return null;
  const c=cs[cs.length-1];
  const atr=calcATR(cs);
  const atrPct=(atr/Math.max(c.close,1))*100;
  const atrHigh=atrPct>0.30,atrLow=atrPct<0.04;
  const effectiveMinConf=atrLow?Math.max(minConf-1,2):minConf;

  const mtfBias=tfCandles?getMTFBias(tfCandles):0;

  const strategies=[
    s_Impulse(cs,atr),s_Trend(cs,atr),s_ORB(cs,orb),s_FVG(cs),
    s_SMC(cs,fakeLog),s_Pattern(cs),s_KZ(cs,hour,kL),s_Asian(cs,hour,kL),
    s_Sweep(cs,atr),s_OB(cs,atr),s_CHoCH(cs,atr),
    s_InsideBar(cs,atr),s_DoubleTopBottom(cs,atr),s_PinBarRejection(cs,atr,kL),
    s_TurtleSoup(cs,atr),s_MomentumContinuation(cs,atr),
  ];

  let B=0,S=0;
  strategies.forEach(sig=>{if(!sig)return;sig.dir==="BUY"?B++:S++;});
  const activeNewsTrade=getActiveNewsTrade(newsArr||[]);
  if(activeNewsTrade?.dir==="BUY")B+=1;
  else if(activeNewsTrade?.dir==="SELL")S+=1;

  if(B<effectiveMinConf&&S<effectiveMinConf)return null;
  if(B===S)return null;

  const rawDir=(B>S)?"BUY":"SELL";

  const hasMTFData=tfCandles&&tfCandles.h1&&tfCandles.h1.length>=3;
  if(hasMTFData&&mtfBias!==0){
    const aligned=(mtfBias>0&&rawDir==="BUY")||(mtfBias<0&&rawDir==="SELL");
    if(!aligned){
      if((rawDir==="BUY"?B:S)<effectiveMinConf+1)return null;
    }
  }

  const dir=rawDir;
  const score=dir==="BUY"?B:S;
  const strengthFloor=40;
  const strengthRange=60;
  const strength=score<=effectiveMinConf
    ?strengthFloor
    :Math.min(100,Math.round(strengthFloor+(score-effectiveMinConf)/(MAX_SCORE-effectiveMinConf)*strengthRange));
  const confirmTags=strategies.filter(sig=>sig&&sig.dir===dir).map(sig=>sig.name);
  if(activeNewsTrade&&activeNewsTrade.dir===dir)confirmTags.push(`${activeNewsTrade.impact.toUpperCase()}-NEWS`);
  if(mtfBias!==0)confirmTags.push(mtfBias>0?"HTF↑":"HTF↓");

  if(nearRound(c.close))return null;
  const extMult=1.5;
  if(dir==="BUY"&&kL.pdh&&c.close>kL.pdh+atr*extMult)return null;
  if(dir==="SELL"&&kL.pdl&&c.close<kL.pdl-atr*extMult)return null;

  const entry=+c.close.toFixed(2);
  const hourGMT=hour||new Date().getUTCHours();

  const{sl, slD}=calcHFTSL({
    cs, dir, entry, atr, spread,
    hourGMT, balance:10,
    inst:_inst,
  });

  const tp1=+snapTP(dir==="BUY"?entry+slD*1.5:entry-slD*1.5,dir).toFixed(2);
  const tp2=+snapTP(dir==="BUY"?entry+slD*3.0:entry-slD*3.0,dir).toFixed(2);
  const tp3=+(dir==="BUY"?entry+slD*6.0:entry-slD*6.0).toFixed(2);

  return{dir,entry,sl,tp1,tp2,tp3,slD:+slD.toFixed(2),score,strength,
    confirms:confirmTags.join(" · "),atr:+atr.toFixed(2),atrHigh,
    buyVotes:B,sellVotes:S,mtfBias};
}
